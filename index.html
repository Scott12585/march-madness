<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Bracket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { text-align: center; margin-bottom: 20px; }
        .matchup { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        .team { padding: 10px; background: white; margin: 5px 0; border-radius: 4px; }
        #sheet-container { padding: 20px; }
        .loading { text-align: center; font-size: 18px; color: #667eea; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 East Bracket</h1>
        <div id="sheet-container">
            <div class="loading">Loading bracket data...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
