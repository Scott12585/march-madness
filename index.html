<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🏀 March Madness 2026</h1>
        
        <div class="tabs">
            <button class="tab-button active" data-sheet="Round of 64">Round of 64</button>
            <button class="tab-button" data-sheet="Round of 32">Round of 32</button>
            <button class="tab-button" data-sheet="Sweet Sixteen">Sweet Sixteen</button>
            <button class="tab-button" data-sheet="Elite Eight">Elite Eight</button>
            <button class="tab-button" data-sheet="Final Four">Final Four</button>
        </div>

        <div class="refresh-info">
            <span id="last-updated">Loading...</span>
            <span class="auto-refresh">🔄 Auto-refreshes every 5 minutes</span>
        </div>

        <div id="sheet-container">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
